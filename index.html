<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="./css/component.css">

<body>
  <header>
    <div class="navbar-container">
      <div class="navbar-content container">
        <div class="logo">
            <img src=".\assets\logo.svg" alt="MCMC Logo" class="logo-icon">
        </div>
        <nav>
          <ul class="nav-list">
            <li><button class="nav-link" data-page="home">Home</button></li>
          </ul>
        </nav>
      </div>
    </div>
  </header>

  <main id="main-content">
    <section class="hero" id="hero-section">
      <div class="container">
        <h1 id="page-title"></h1>
        <p id="page-subtitle"></p>
        <div class="cta-buttons" id="hero-buttons"></div>
      </div>
    </section>

    <!-- <section class="mockup-section hidden" id="mockup-section">
    <div class="container">
        <div class="mockup-header">
            <h2 id="mockup-title"></h2>
            <p id="mockup-subtitle"></p>
        </div>
        <div id="mockup-image-container" class="mockup-image-container"></div>
    </div> 
    </section> -->

    <section class="mockup-section" id="mockup-section">
      <div class="container">
        <div class="mockup-header">
          <h2 id="mockup-title"></h2>
          <p id="mockup-subtitle"></p>
        </div>
        <!-- <div class="info-cards"></div> -->
        <div id="mockup-image-container"></div>
      </div>
    </section>

    <section class="info-section" id="info-section">
      <div class="container">
        <h2 id="info-title"></h2>
        <div class="info-cards"></div>
      </div>
    </section>

    <section class="page-section hidden" id="page-section">
      <div class="container">
        <h2 id="section-title"></h2>
        <p id="section-text"></p>
        <div class="page-details" id="section-details"></div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container footer-bottom">
      <div class="footer-links">
        <button class="footer-link" data-page="privacy">Privacy</button>
        <button class="footer-link" data-page="help">Help</button>
        <button class="footer-link" data-page="contact">Contact</button>
      </div>
      <p>© 2026 Malaysian Communications and Multimedia Commission</p>
    </div>
  </footer>

  <script src="./js/script.js"></script>
